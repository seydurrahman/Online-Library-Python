{% extends "library/base.html" %} 
{% load crispy_forms_tags %} 
{% block content %}
<div class="container">
  <h2>Edit Rack: {{ rack.rack_number }}</h2>
  <form method="post">
    {% csrf_token %} {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'library:self_rack_add' %}" class="btn btn-secondary ms-2"
      >Cancel</a
    >
  </form>
</div>
{% endblock %}
